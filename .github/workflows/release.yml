name: release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: ./gradlew shadowJar --no-daemon

      - name: Rename jar
        run: mv build/libs/EnthusiaVotes-0.1.0.jar "build/libs/EnthusiaVotes-v0.1.${{ github.run_number }}.jar"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          files: build/libs/EnthusiaVotes-v0.1.${{ github.run_number }}.jar
          generate_release_notes: true
          make_latest: true
