name: release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Compute version
        id: version
        run: echo "version=v0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build shadowJar
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew shadowJar --no-daemon -PreleaseVersion="$RELEASE_VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: EnthusiaVotes ${{ steps.version.outputs.version }}
          files: build/libs/EnthusiaVotes-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
