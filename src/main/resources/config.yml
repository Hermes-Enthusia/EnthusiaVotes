# EnthusiaVotes configuration

storage:
  backend: sqlite
  file: "votes.db"
  mariadb:
    host: "localhost"
    port: 3306
    database: "enthusiavotes"
    user: "enthusia"
    password: "changeme"

gold:
  min: 1
  max: 10

vote-party:
  threshold: 100
  duration-minutes: 5

reminder-interval-minutes: 5

# Sound for each individual vote (tabbed-out audio cue)
vote-sound: "BLOCK_AMETHYST_BLOCK_CHIME"

# Sound + bonus when player votes on all configured sites in one day
all-sites-sound: "ENTITY_PLAYER_LEVELUP"
all-sites-bonus-gold: 20
all-sites-bonus-multiplier: 0.5

vote-sites:
  - name: "Planet Minecraft"
    url: "https://www.planetminecraft.com/server/badgersmc/vote/"
  - name: "MinecraftServers.org"
    url: "https://minecraftservers.org/vote/123456"
  - name: "Minecraft-MP"
    url: "https://minecraft-mp.com/server/123456/vote/"
  - name: "TopG"
    url: "https://topg.org/minecraft-servers/server-123456/vote"
